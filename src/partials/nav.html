<!-- Spacer that matches nav + (optional) promo strip height so content doesn't slide under -->
<div id="navSpacer" class="h-16"></div>

<script>
  // Show the promo strip unless user dismissed it, and push nav down under it
  (function() {
    var strip = document.getElementById('brandkitStrip');
    var nav = document.getElementById('mainNav');
    var spacer = document.getElementById('navSpacer');
    var dismissed = false;
    try { dismissed = localStorage.getItem('brandkit_dismissed') === '1'; } catch(e) {}
    if (!dismissed) {
      strip.classList.remove('hidden');
      function applyOffset() {
        var h = strip.offsetHeight;
        nav.style.top = h + 'px';
        if (spacer) spacer.style.height = (h + 64) + 'px'; // nav is 64px
      }
      applyOffset();
      window.addEventListener('resize', applyOffset);
    }
  })();

  function dismissBrandkitStrip() {
    var strip = document.getElementById('brandkitStrip');
    var nav = document.getElementById('mainNav');
    var spacer = document.getElementById('navSpacer');
    try { localStorage.setItem('brandkit_dismissed', '1'); } catch(e) {}
    strip.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    strip.style.transform = 'translateY(-100%)';
    strip.style.opacity = '0';
    nav.style.top = '0';
    if (spacer) spacer.style.height = '64px';
    setTimeout(function(){ strip.remove(); }, 300);
  }
</script>
